<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Time Poll Application</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <h1>📊 Real Time Poll</h1>

    <div class="poll-box">

        <h2 id="question">
            Which Programming Language do you like the most?
        </h2>

        <form id="pollForm">

            <label class="option">
                <input type="radio" name="vote" value="0">
                HTML
            </label>

            <label class="option">
                <input type="radio" name="vote" value="1">
                CSS
            </label>

            <label class="option">
                <input type="radio" name="vote" value="2">
                JavaScript
            </label>

            <label class="option">
                <input type="radio" name="vote" value="3">
                Python
            </label>

            <button type="submit" id="voteBtn">
                Vote
            </button>

        </form>

    </div>

    <div class="results">

        <h2>Live Results</h2>

        <!-- HTML -->
        <div class="result-item">
            <div class="title">
                <span>HTML</span>
                <span id="htmlPercent">0%</span>
            </div>

            <div class="progress">
                <div class="bar" id="bar0"></div>
            </div>
        </div>

        <!-- CSS -->
        <div class="result-item">
            <div class="title">
                <span>CSS</span>
                <span id="cssPercent">0%</span>
            </div>

            <div class="progress">
                <div class="bar" id="bar1"></div>
            </div>
        </div>

        <!-- JavaScript -->
        <div class="result-item">
            <div class="title">
                <span>JavaScript</span>
                <span id="jsPercent">0%</span>
            </div>

            <div class="progress">
                <div class="bar" id="bar2"></div>
            </div>
        </div>

        <!-- Python -->
        <div class="result-item">
            <div class="title">
                <span>Python</span>
                <span id="pythonPercent">0%</span>
            </div>

            <div class="progress">
                <div class="bar" id="bar3"></div>
            </div>
        </div>

        <div class="votes">
            Total Votes :
            <span id="totalVotes">0</span>
        </div>

        <button id="resetBtn">
            Reset Poll
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
