<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Expense Tracker</h1>

<div class="balance-box">
<h2>Your Balance</h2>
<h1 id="balance">₹0</h1>
</div>

<div class="summary">

<div class="income">
<h3>Income</h3>
<p id="money-plus">₹0</p>
</div>

<div class="expense">
<h3>Expense</h3>
<p id="money-minus">₹0</p>
</div>

</div>

<h3>History</h3>

<ul id="list"></ul>

<h3>Add New Transaction</h3>

<form id="form">

<label>Text</label>
<input type="text" id="text" placeholder="Enter description">

<label>Amount</label>
<input type="number" id="amount" placeholder="Income (+) or Expense (-)">

<button>Add Transaction</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
