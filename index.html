<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Management System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Learning Management System</h1>

    <input type="text" id="search" placeholder="Search Course...">

    <button id="themeBtn">🌙 Dark Mode</button>
</header>

<section class="progress-section">
    <h2>Your Progress</h2>

    <div class="progress-bar">
        <div id="progress"></div>
    </div>

    <p id="progressText">0% Completed</p>
</section>

<section class="courses" id="courseContainer">

    <div class="course">
        <h2>HTML Basics</h2>
        <p>Learn HTML from scratch.</p>
        <button class="completeBtn">Complete</button>
    </div>

    <div class="course">
        <h2>CSS Mastery</h2>
        <p>Learn modern CSS.</p>
        <button class="completeBtn">Complete</button>
    </div>

    <div class="course">
        <h2>JavaScript</h2>
        <p>Become a JS Developer.</p>
        <button class="completeBtn">Complete</button>
    </div>

    <div class="course">
        <h2>React</h2>
        <p>Frontend Library.</p>
        <button class="completeBtn">Complete</button>
    </div>

    <div class="course">
        <h2>Node.js</h2>
        <p>Backend Development.</p>
        <button class="completeBtn">Complete</button>
    </div>

    <div class="course">
        <h2>MongoDB</h2>
        <p>Database Basics.</p>
        <button class="completeBtn">Complete</button>
    </div>

</section>

<script src="script.js"></script>

</body>
</html>
